<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Fechamento por Turno</title>
    <script src="config.js"></script>
    <style>
        body { background-color: #0d0d0d; font-family: 'Segoe UI', sans-serif; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Painel de Input (Esquerda) */
        .painel-input { width: 350px; background: #161616; padding: 30px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        h2 { color: #3498db; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase; }

        label { display: block; margin-top: 10px; font-size: 0.7rem; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #333; background: #0a0a0a; color: #fff; box-sizing: border-box; }
        
        .btn-registrar { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        .btn-registrar:hover { background: #2ecc71; box-shadow: 0 0 15px rgba(39, 174, 96, 0.4); }

        /* Painel de Registros (Direita) */
        .painel-registros { flex-grow: 1; padding: 40px; background: #0a0a0a; overflow-y: auto; }
        .header-turno { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .turno-tag { background: #3498db; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        .lista-qualidades { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        /* Card de Qualidade Fechada */
        .card-fechado { background: #161616; border: 1px solid #333; border-left: 5px solid #27ae60; padding: 20px; border-radius: 4px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .card-fechado h3 { margin: 0 0 15px 0; font-size: 0.8rem; color: #888; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .metric { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .metric span { font-size: 0.8rem; color: #666; }
        .metric b { font-size: 1rem; }
    </style>
</head>
<body onload="init()">

    <!-- LADO ESQUERDO: INPUT -->
    <div class="painel-input">
        <h2>Lançamento</h2>
        
        <label>ORDEM DE QUALIDADE</label>
        <select id="ordem">
            <option value="1ª Qualidade">1ª Qualidade</option>
            <option value="2ª Qualidade">2ª Qualidade</option>
            <option value="3ª Qualidade">3ª Qualidade</option>
            <option value="4ª Qualidade">4ª Qualidade</option>
        </select>

        <label>BITOLA</label>
        <select id="bitola" onchange="atualizarFatores()"></select>

        <label style="color: #27ae60;">A (PEGADAS)</label>
        <input type="number" id="in-A" placeholder="0">

        <label style="color: #f1c40f;">C (PEGADAS)</label>
        <input type="number" id="in-C" placeholder="0">

        <label style="color: #e74c3c;">QUEBRA (PEÇAS)</label>
        <input type="number" id="in-Q" placeholder="0">

        <button class="btn-registrar" onclick="registrarQualidade()">Registrar Qualidade</button>
    </div>

    <!-- LADO DIREITO: QUALIDADES FECHADAS -->
    <div class="painel-registros">
        <div class="header-turno">
            <h1 style="font-size: 1.2rem; margin: 0;">Qualidades Fechadas do Turno</h1>
            <div class="turno-tag" id="display-turno">Identificando Turno...</div>
        </div>

        <div id="lista-fechamentos" class="lista-qualidades">
            <!-- Os registros aparecerão aqui conforme forem fechados -->
        </div>
    </div>

    <script>
        let turnoAtual = "";

        function init() {
            // Inicializa Bitolas
            const sel = document.getElementById('bitola');
            if(typeof BANCO_BITOLAS !== 'undefined') {
                sel.innerHTML = Object.keys(BANCO_BITOLAS).map(k => `<option value="${k}">${BANCO_BITOLAS[k].nome}</option>`).join('');
            }

            // Define Turno pelo Horário Atual
            const hora = new Date().getHours();
            if (hora >= 5 && hora < 13) turnoAtual = "TURNO A (05h-13h)";
            else if (hora >= 13 && hora < 21) turnoAtual = "TURNO B (13h-21h)";
            else turnoAtual = "TURNO C (21h-05h)";
            
            document.getElementById('display-turno').innerText = turnoAtual;
        }

        function registrarQualidade() {
            const b = (typeof BANCO_BITOLAS !== 'undefined' ? BANCO_BITOLAS : {padrao:{fatorPegada:0.5, m2Peca:1}})[document.getElementById('bitola').value];
            
            // Cálculos conforme regras de negócio
            const aM2 = (parseFloat(document.getElementById('in-A').value) || 0) * b.fatorPegada;
            const cM2 = (parseFloat(document.getElementById('in-C').value) || 0) * b.fatorPegada;
            const qPcs = parseFloat(document.getElementById('in-Q').value) || 0;
            const qM2 = qPcs * b.m2Peca;

            const prodTotal = aM2 + cM2;
            const totalGeral = prodTotal + qM2;

            const percA = prodTotal > 0 ? ((aM2 / prodTotal) * 100).toFixed(1) : "0.0";
            const percC = prodTotal > 0 ? ((cM2 / prodTotal) * 100).toFixed(1) : "0.0";
            const percQ = totalGeral > 0 ? ((qM2 / totalGeral) * 100).toFixed(1) : "0.0";

            // Criar o card no lado direito
            const container = document.getElementById('lista-fechamentos');
            const card = document.createElement('div');
            card.className = 'card-fechado';
            
            const horaRegistro = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            card.innerHTML = `
                <h3>${document.getElementById('ordem').value} - ${horaRegistro}</h3>
                <div class="metric"><span>Produção:</span> <b>${prodTotal.toFixed(2)} m²</b></div>
                <div class="metric"><span>Classe A:</span> <b style="color:#27ae60">${percA}%</b></div>
                <div class="metric"><span>Classe C:</span> <b style="color:#f1c40f">${percC}%</b></div>
                <div class="metric"><span>Quebra:</span> <b style="color:#e74c3c">${percQ}%</b></div>
            `;

            container.prepend(card); // Adiciona o mais recente no topo

            // Limpar campos para o próximo
            document.getElementById('in-A').value = "";
            document.getElementById('in-C').value = "";
            document.getElementById('in-Q').value = "";
        }
    </script>
</body>
</html>
