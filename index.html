<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade - Master</title>
    <script src="config.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --primary: #3498db;
            --success: #27ae60; --warning: #f1c40f; --danger: #e74c3c;
            --text: #eee; --border: #282828;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; display: none; flex-direction: column; gap: 15px; }
        
        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 280px; }
        
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        h2 { font-size: 0.85rem; color: var(--primary); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 0; letter-spacing: 1px; }
        
        label { display: block; font-size: 0.65rem; color: #888; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid var(--border); background: #1f1f1f; color: #fff; box-sizing: border-box; font-size: 0.9rem; }
        
        .admin-nav { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .btn-tab { background: #1a1a1a; padding: 10px; font-size: 0.7rem; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; flex: 1; color: #888; }
        .btn-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        th { background: #111; color: var(--primary); }
        
        .btn-acao { background: var(--success); font-weight: bold; cursor: pointer; border: none; margin-top: 10px; color: white; }
        .btn-add-bitola { background: transparent; border: 1px dashed var(--primary); color: var(--primary); margin-bottom: 20px; cursor: pointer; }
        .btn-logout { background: #333; width: auto; float: right; font-size: 0.65rem; padding: 5px 10px; border: none; cursor: pointer; }
        
        .bitola-edit-card { border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #1a1a1a; position: relative; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--danger); cursor: pointer; width: auto; padding: 0; }
        
        .flex-row { display: flex; gap: 10px; }
        .perc-tag { background: #111; padding: 12px; border-radius: 6px; min-width: 55px; text-align: center; font-size: 0.8rem; border: 1px solid var(--border); align-self: flex-end; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="border:none">SISTEMA QUALIDADE</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-acao" onclick="autenticar()">ENTRAR</button>
        </div>
    </div>

    <div class="container" id="app-content">
        <header style="margin-bottom: 20px;">
            <button class="btn-logout" onclick="location.reload()">SAIR</button>
            <span id="txt-user" style="font-size: 0.7rem; color: var(--primary); font-weight: bold;"></span>
        </header>

        <div id="view-op" style="display:none;">
            <div class="card">
                <h2>Lançamento de Produção</h2>
                <label>Bitola Selecionada</label>
                <select id="bitola" onchange="calcular()"></select>
                
                <div class="flex-row">
                    <div style="flex:1"><label>A (1ª Qualidade - Pegadas)</label><input type="number" id="in-A" oninput="calcular()"></div>
                    <div class="perc-tag" id="tag-A" style="color:var(--success)">0%</div>
                </div>
                
                <div class="flex-row">
                    <div style="flex:1"><label>C (2ª/3ª - Pegadas)</label><input type="number" id="in-C" oninput="calcular()"></div>
                    <div class="perc-tag" id="tag-C" style="color:var(--warning)">0%</div>
                </div>

                <div class="flex-row">
                    <div style="flex:1"><label>Quebra (Peças Soltas)</label><input type="number" id="in-Q" oninput="calcular()"></div>
                    <div class="perc-tag" id="tag-Q" style="color:var(--danger)">0%</div>
                </div>

                <div style="text-align:center; padding:20px; background:#000; margin-top:20px; border-radius:8px; border: 1px solid #333">
                    <small style="color:#666">PRODUÇÃO COMERCIAL TOTAL</small><br>
                    <b id="res-total" style="font-size:2.2rem; color:var(--primary)">0.00</b> <small>m²</small>
                </div>
                <button class="btn-acao" onclick="salvar()">FINALIZAR LANÇAMENTO</button>
            </div>
        </div>

        <div id="view-admin" style="display:none;">
            <div class="admin-nav">
                <button class="btn-tab active" onclick="switchTab('tab-caderno')">CADERNO</button>
                <button class="btn-tab" onclick="switchTab('tab-users')">USUÁRIOS</button>
                <button class="btn-tab" onclick="switchTab('tab-config')">CONFIG. BITOLAS</button>
            </div>

            <div id="tab-caderno" class="admin-content">
                <div class="card"><input type="date" id="filtro-data" onchange="renderCaderno()"></div>
                <div class="card" style="overflow-x:auto">
                    <table>
                        <thead>
                            <tr><th>DATA/HORA</th><th>TURNO</th><th>BITOLA</th><th>A (m²)</th><th>C (m²)</th><th>Q (m²)</th><th>TOTAL</th></tr>
                        </thead>
                        <tbody id="corpo-caderno"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-users" class="admin-content" style="display:none;">
                <div class="card">
                    <h2>Cadastrar Novo Operador</h2>
                    <input type="text" id="new-user" placeholder="Login do Funcionário">
                    <input type="password" id="new-pass" placeholder="Senha">
                    <select id="new-turno"><option>A</option><option>B</option><option>C</option></select>
                    <button class="btn-acao" onclick="addUsuario()">CADASTRAR</button>
                </div>
            </div>

            <div id="tab-config" class="admin-content" style="display:none;">
                <button class="btn-add-bitola" onclick="addNovaBitola()">+ ADICIONAR NOVA BITOLA</button>
                <div id="editor-bitolas"></div>
                <button class="btn-acao" style="background:var(--primary)" onclick="salvarConfigBitolas()">SALVAR TODAS AS ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script>
        let userAtivo = null;
        let BITOLAS_SISTEMA = {};

        function initBitolas() {
            const salvas = localStorage.getItem('bitolas_config');
            BITOLAS_SISTEMA = salvas ? JSON.parse(salvas) : BANCO_BITOLAS;
        }

        function autenticar() {
            initBitolas();
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            const db_users = JSON.parse(localStorage.getItem('usuarios_db')) || [{user:'admin', pass:'admin', nivel:'admin', turno:'Geral'}];
            
            userAtivo = db_users.find(x => x.user === u && x.pass === p);
            if(userAtivo) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                document.getElementById('txt-user').innerText = `SESSÃO: ${userAtivo.user.toUpperCase()}`;
                
                if(userAtivo.nivel === 'admin') {
                    document.getElementById('view-admin').style.display = 'block';
                    renderCaderno();
                    renderEditorBitolas();
                } else {
                    document.getElementById('view-op').style.display = 'block';
                    carregarSelectBitolas();
                }
            } else { alert("Acesso Negado."); }
        }

        function carregarSelectBitolas() {
            const sel = document.getElementById('bitola');
            sel.innerHTML = Object.keys(BITOLAS_SISTEMA).map(k => `<option value="${k}">${BITOLAS_SISTEMA[k].nome}</option>`).join('');
            calcular();
        }

        function calcular() {
            const b = BITOLAS_SISTEMA[document.getElementById('bitola').value];
            const pegA = parseFloat(document.getElementById('in-A').value) || 0;
            const pegC = parseFloat(document.getElementById('in-C').value) || 0;
            const pecQ = parseFloat(document.getElementById('in-Q').value) || 0;

            const mA = pegA * b.fatorPegada;
            const mC = pegC * b.fatorPegada;
            const mQ = pecQ * b.m2Peca;

            document.getElementById('tag-A').innerText = (mA+mC > 0 ? (mA/(mA+mC)*100).toFixed(1) : 0) + "%";
            document.getElementById('tag-C').innerText = (mA+mC > 0 ? (mC/(mA+mC)*100).toFixed(1) : 0) + "%";
            document.getElementById('tag-Q').innerText = (mA+mC+mQ > 0 ? (mQ/(mA+mC+mQ)*100).toFixed(1) : 0) + "%";
            document.getElementById('res-total').innerText = (mA + mC).toFixed(2);
        }

        function salvar() {
            const b = BITOLAS_SISTEMA[document.getElementById('bitola').value];
            const pegA = parseFloat(document.getElementById('in-A').value) || 0;
            const pegC = parseFloat(document.getElementById('in-C').value) || 0;
            const pecQ = parseFloat(document.getElementById('in-Q').value) || 0;

            const registro = {
                data: new Date().toLocaleDateString('pt-BR'),
                hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
                turno: userAtivo.turno,
                bitola: b.nome,
                ma: pegA * b.fatorPegada,
                mc: pegC * b.fatorPegada,
                mq: pecQ * b.m2Peca,
                total: (pegA + pegC) * b.fatorPegada
            };

            let caderno = JSON.parse(localStorage.getItem('producao_caderno')) || [];
            caderno.push(registro);
            localStorage.setItem('producao_caderno', JSON.stringify(caderno));
            alert("Sucesso!"); location.reload();
        }

        // --- ADMIN BITOLAS ---
        function renderEditorBitolas() {
            const container = document.getElementById('editor-bitolas');
            container.innerHTML = Object.keys(BITOLAS_SISTEMA).map(k => `
                <div class="bitola-edit-card" data-key="${k}">
                    <button class="btn-del" onclick="removerBitola('${k}')">REMOVER</button>
                    <label>Nome Comercial</label>
                    <input type="text" class="edit-nome" value="${BITOLAS_SISTEMA[k].nome}">
                    <div class="flex-row">
                        <div style="flex:1">
                            <label>Peças por Pegada</label>
                            <input type="number" class="edit-peças-peg" value="${BITOLAS_SISTEMA[k].pecasPorPegada || 0}">
                        </div>
                        <div style="flex:1">
                            <label>m² da Pegada</label>
                            <input type="number" step="0.0001" class="edit-fator" value="${BITOLAS_SISTEMA[k].fatorPegada}">
                        </div>
                        <div style="flex:1">
                            <label>m² Unitário (Peça)</label>
                            <input type="number" step="0.0001" class="edit-peca" value="${BITOLAS_SISTEMA[k].m2Peca}">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addNovaBitola() {
            const id = "bit_" + Date.now();
            BITOLAS_SISTEMA[id] = { nome: "Nova Bitola", fatorPegada: 0, m2Peca: 0, pecasPorPegada: 0 };
            renderEditorBitolas();
        }

        function removerBitola(key) {
            if(confirm("Excluir esta bitola?")) {
                delete BITOLAS_SISTEMA[key];
                renderEditorBitolas();
            }
        }

        function salvarConfigBitolas() {
            const cards = document.querySelectorAll('.bitola-edit-card');
            const novoObjeto = {};
            cards.forEach(card => {
                const key = card.dataset.key;
                novoObjeto[key] = {
                    nome: card.querySelector('.edit-nome').value,
                    pecasPorPegada: parseInt(card.querySelector('.edit-peças-peg').value),
                    fatorPegada: parseFloat(card.querySelector('.edit-fator').value),
                    m2Peca: parseFloat(card.querySelector('.edit-peca').value)
                };
            });
            BITOLAS_SISTEMA = novoObjeto;
            localStorage.setItem('bitolas_config', JSON.stringify(BITOLAS_SISTEMA));
            alert("Parâmetros Atualizados!");
        }

        function switchTab(tabId) {
            document.querySelectorAll('.admin-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function renderCaderno() {
            const dados = JSON.parse(localStorage.getItem('producao_caderno')) || [];
            const filtro = document.getElementById('filtro-data').value;
            const corpo = document.getElementById('corpo-caderno');
            let dataFiltro = filtro ? new Date(filtro).toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : null;

            corpo.innerHTML = dados.filter(d => !dataFiltro || d.data === dataFiltro)
                .reverse().map(d => `
                <tr>
                    <td>${d.data}<br>${d.hora}</td>
                    <td>${d.turno}</td>
                    <td>${d.bitola}</td>
                    <td style="color:var(--success)">${d.ma.toFixed(2)}</td>
                    <td style="color:var(--warning)">${d.mc.toFixed(2)}</td>
                    <td style="color:var(--danger)">${d.mq.toFixed(2)}</td>
                    <td><b>${d.total.toFixed(2)}</b></td>
                </tr>
            `).join('');
        }

        function addUsuario() {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            const t = document.getElementById('new-turno').value;
            if(!u || !p) return alert("Preencha os campos!");
            let db = JSON.parse(localStorage.getItem('usuarios_db')) || [{user:'admin', pass:'admin', nivel:'admin', turno:'Geral'}];
            db.push({user: u, pass: p, nivel: 'op', turno: t});
            localStorage.setItem('usuarios_db', JSON.stringify(db));
            alert("Operador cadastrado!");
        }
    </script>
</body>
</html>
