<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade - Admin</title>
    <script src="config.js"></script>
    <style>
        body { background-color: #0f0f0f; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 320px; }
        
        /* LAYOUT */
        #conteudo-principal { display: none; width: 100%; display: flex; }
        .col-esquerda { width: 400px; background: #161616; padding: 20px; border-right: 1px solid #333; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .col-monitor { flex-grow: 1; padding: 30px; background: #0a0a0a; overflow-y: auto; height: 100vh; box-sizing: border-box; }

        h2 { color: #3498db; font-size: 0.9rem; text-transform: uppercase; margin: 20px 0 10px 0; border-left: 4px solid #3498db; padding-left: 10px; }
        label { display: block; margin-top: 10px; font-size: 0.7rem; color: #888; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-reg { background: #27ae60; color: white; }
        .btn-admin { background: #8e44ad; color: white; font-size: 0.7rem; }

        /* ADMIN PANEL */
        #painel-admin { background: #202020; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #8e44ad; display: none; }
        
        /* MONITOR */
        .grid-resultados { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; position: relative; border-top: 4px solid #3498db; }
        .log-admin { font-size: 0.65rem; color: #8e44ad; margin-top: 10px; border-top: 1px solid #222; padding-top: 5px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Acesso ao Sistema</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn btn-reg" onclick="autenticar()">Entrar</button>
        </div>
    </div>

    <div id="conteudo-principal">
        <div class="col-esquerda">
            <!-- PAINEL EXCLUSIVO ADMIN -->
            <div id="painel-admin">
                <h2 style="color: #9b59b6; border-color: #9b59b6;">Gerenciar Usuários</h2>
                <input type="text" id="adm-nome" placeholder="Nome do Operador">
                <select id="adm-turno">
                    <option value="A">Turno A</option>
                    <option value="B">Turno B</option>
                    <option value="C">Turno C</option>
                </select>
                <input type="password" id="adm-pass" placeholder="Definir Senha">
                <button class="btn btn-admin" onclick="cadastrarUsuario()">Adicionar Usuário</button>
            </div>

            <h2>Registrar Qualidade</h2>
            <label>ORDEM</label>
            <select id="ordem">
                <option>1ª Qualidade</option><option>2ª Qualidade</option>
                <option>3ª Qualidade</option><option>4ª Qualidade</option>
            </select>

            <label>BITOLA</label>
            <select id="bitola"></select>

            <label style="color:#27ae60">A (PEGADAS)</label>
            <input type="number" id="in-A">

            <label style="color:#f1c40f">C (PEGADAS)</label>
            <input type="number" id="in-C">

            <label style="color:#e74c3c">Q (PEÇAS)</label>
            <input type="number" id="in-Q">

            <label>OBSERVAÇÕES (DEFEITOS/MOTIVOS)</label>
            <textarea id="obs" style="width:100%; height:60px; background:#252525; color:white; border:1px solid #333;"></textarea>

            <button class="btn btn-reg" onclick="registrarQualidade()">Registrar no Turno</button>
        </div>

        <div class="col-monitor">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Monitor de Qualidade Realizado</h2>
                <div id="user-logado" style="color:#8e44ad; font-size:0.8rem; font-weight:bold;"></div>
            </div>
            <div id="lista-cards" class="grid-resultados"></div>
        </div>
    </div>

    <script>
        // Banco de dados em memória (simulado)
        let usuarios = [
            {user: "admin", pass: "admin", turno: "Geral", nivel: "admin"},
            {user: "op1", pass: "123", turno: "A", nivel: "op"}
        ];

        let usuarioAtivo = null;

        function autenticar() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;

            const encontrou = usuarios.find(user => user.user === u && user.pass === p);

            if (encontrou) {
                usuarioAtivo = encontrou;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('conteudo-principal').style.display = 'flex';
                document.getElementById('user-logado').innerText = `Operador: ${usuarioAtivo.user} | Turno: ${usuarioAtivo.turno}`;
                
                if (usuarioAtivo.nivel === 'admin') {
                    document.getElementById('painel-admin').style.display = 'block';
                }
                init();
            } else {
                alert("Usuário ou senha inválidos!");
            }
        }

        function cadastrarUsuario() {
            const nome = document.getElementById('adm-nome').value;
            const turno = document.getElementById('adm-turno').value;
            const pass = document.getElementById('adm-pass').value;

            if(nome && pass) {
                usuarios.push({user: nome, pass: pass, turno: turno, nivel: "op"});
                alert(`Usuário ${nome} cadastrado para o Turno ${turno}`);
                document.getElementById('adm-nome').value = "";
                document.getElementById('adm-pass').value = "";
            }
        }

        function init() {
            const sel = document.getElementById('bitola');
            const bitolas = typeof BANCO_BITOLAS !== 'undefined' ? BANCO_BITOLAS : {"padrao": {nome: "Padrão", fatorPegada: 0.5, m2Peca: 1}};
            sel.innerHTML = Object.keys(bitolas).map(k => `<option value="${k}">${bitolas[k].nome}</option>`).join('');
        }

        function registrarQualidade() {
            const b = (typeof BANCO_BITOLAS !== 'undefined' ? BANCO_BITOLAS : {"padrao": {fatorPegada: 0.5, m2Peca: 1}})[document.getElementById('bitola').value];
            
            const a = (parseFloat(document.getElementById('in-A').value) || 0) * b.fatorPegada;
            const c = (parseFloat(document.getElementById('in-C').value) || 0) * b.fatorPegada;
            const q = (parseFloat(document.getElementById('in-Q').value) || 0) * b.m2Peca;

            const prod = a + c;
            const totalGeral = a + c + q;

            const pA = prod > 0 ? ((a/prod)*100).toFixed(2) : 0;
            const pC = prod > 0 ? ((c/prod)*100).toFixed(2) : 0;
            const pQ = totalGeral > 0 ? ((q/totalGeral)*100).toFixed(2) : 0;

            const lista = document.getElementById('lista-cards');
            const card = document.createElement('div');
            card.className = 'card';
            
            const agora = new Date().toLocaleTimeString();

            card.innerHTML = `
                <div style="font-size:0.7rem; color:#888;">${document.getElementById('ordem').value} | ${agora}</div>
                <div style="font-size:1.4rem; color:#3498db; margin:5px 0;">${prod.toFixed(2)} m²</div>
                <div style="font-size:0.8rem;">
                    A: <span style="color:#27ae60">${pA}%</span> | 
                    C: <span style="color:#f1c40f">${pC}%</span> | 
                    Q: <span style="color:#e74c3c">${pQ}%</span>
                </div>
                <div class="log-admin">
                    Rastreador: Lançado por <b>${usuarioAtivo.user}</b> no Turno <b>${usuarioAtivo.turno}</b>
                </div>
            `;

            lista.prepend(card);
            
            // Limpa campos
            document.getElementById('in-A').value = "";
            document.getElementById('in-C').value = "";
            document.getElementById('in-Q').value = "";
        }
    </script>
</body>
</html>
