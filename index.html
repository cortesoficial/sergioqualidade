<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fechamento de Qualidade</title>
    <script src="config.js"></script>
    <style>
        body { background-color: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; margin: 0; display: flex; padding: 20px; gap: 20px; }
        
        /* Painel de Controle (Esquerda) */
        .painel-controle { width: 380px; background: #151515; padding: 25px; border-radius: 8px; border: 1px solid #333; position: sticky; top: 20px; height: fit-content; }
        h2 { color: #3498db; font-size: 1rem; text-transform: uppercase; margin-bottom: 20px; border-left: 4px solid #3498db; padding-left: 10px; }

        label { display: block; margin-top: 15px; font-size: 0.75rem; color: #777; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 4px; border: 1px solid #333; background: #0f0f0f; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: #3498db; }

        .btn-fechar { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 4px; background: #2980b9; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-fechar:hover { background: #3498db; }

        /* Monitor de Fechamentos (Direita) */
        .monitor-fechamento { flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; align-content: start; }
        .card-fechado { background: #151515; border: 1px solid #333; border-radius: 6px; padding: 15px; opacity: 0.5; transition: 0.3s; }
        .card-fechado.ativo { opacity: 1; border-color: #27ae60; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .header-card { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        .header-card span { font-size: 0.8rem; font-weight: bold; }
        
        .status-valor { display: flex; justify-content: space-between; margin: 8px 0; }
        .status-valor label { margin: 0; color: #888; text-transform: none; }
        .status-valor b { font-size: 1.1rem; }

        .tag-info { background: #333; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
    </style>
</head>
<body onload="init()">

    <div class="painel-controle">
        <h2>Mecanismo de Fechamento</h2>
        
        <label>Selecione o Slot</label>
        <select id="slot">
            <option value="1">1ª Qualidade do Turno</option>
            <option value="2">2ª Qualidade do Turno</option>
            <option value="3">3ª Qualidade do Turno</option>
            <option value="4">4ª Qualidade do Turno</option>
        </select>

        <label>Bitola</label>
        <select id="bitola"></select>

        <label style="color: #27ae60;">A (Pegadas)</label>
        <input type="number" id="in-A" placeholder="0">

        <label style="color: #f1c40f;">C (Pegadas)</label>
        <input type="number" id="in-C" placeholder="0">

        <label style="color: #e74c3c;">Q (Peças)</label>
        <input type="number" id="in-Q" placeholder="0">

        <button class="btn-fechar" onclick="fecharQualidade()">Confirmar Fechamento</button>
    </div>

    <div class="monitor-fechamento">
        <!-- Cards Gerados Dinamicamente -->
        <div id="res-1" class="card-fechado">
            <div class="header-card"><span>1ª QUALIDADE</span> <span class="tag-info">AGUARDANDO</span></div>
            <div class="status-valor"><label>Prod. Total:</label> <b class="v-total">---</b></div>
            <div class="status-valor"><label>Índice A:</label> <b class="v-a" style="color:#27ae60">---</b></div>
            <div class="status-valor"><label>Índice C:</label> <b class="v-c" style="color:#f1c40f">---</b></div>
            <div class="status-valor"><label>Quebra:</label> <b class="v-q" style="color:#e74c3c">---</b></div>
        </div>
        
        <div id="res-2" class="card-fechado">
            <div class="header-card"><span>2ª QUALIDADE</span> <span class="tag-info">AGUARDANDO</span></div>
            <div class="status-valor"><label>Prod. Total:</label> <b class="v-total">---</b></div>
            <div class="status-valor"><label>Índice A:</label> <b class="v-a" style="color:#27ae60">---</b></div>
            <div class="status-valor"><label>Índice C:</label> <b class="v-c" style="color:#f1c40f">---</b></div>
            <div class="status-valor"><label>Quebra:</label> <b class="v-q" style="color:#e74c3c">---</b></div>
        </div>

        <div id="res-3" class="card-fechado">
            <div class="header-card"><span>3ª QUALIDADE</span> <span class="tag-info">AGUARDANDO</span></div>
            <div class="status-valor"><label>Prod. Total:</label> <b class="v-total">---</b></div>
            <div class="status-valor"><label>Índice A:</label> <b class="v-a" style="color:#27ae60">---</b></div>
            <div class="status-valor"><label>Índice C:</label> <b class="v-c" style="color:#f1c40f">---</b></div>
            <div class="status-valor"><label>Quebra:</label> <b class="v-q" style="color:#e74c3c">---</b></div>
        </div>

        <div id="res-4" class="card-fechado">
            <div class="header-card"><span>4ª QUALIDADE</span> <span class="tag-info">AGUARDANDO</span></div>
            <div class="status-valor"><label>Prod. Total:</label> <b class="v-total">---</b></div>
            <div class="status-valor"><label>Índice A:</label> <b class="v-a" style="color:#27ae60">---</b></div>
            <div class="status-valor"><label>Índice C:</label> <b class="v-c" style="color:#f1c40f">---</b></div>
            <div class="status-valor"><label>Quebra:</label> <b class="v-q" style="color:#e74c3c">---</b></div>
        </div>
    </div>

    <script>
        function init() {
            const sel = document.getElementById('bitola');
            if(typeof BANCO_BITOLAS !== 'undefined') {
                sel.innerHTML = Object.keys(BANCO_BITOLAS).map(k => `<option value="${k}">${BANCO_BITOLAS[k].nome}</option>`).join('');
            }
        }

        function fecharQualidade() {
            const b = (typeof BANCO_BITOLAS !== 'undefined' ? BANCO_BITOLAS : {padrao:{fatorPegada:0.5, m2Peca:1}})[document.getElementById('bitola').value];
            const slotId = document.getElementById('slot').value;
            
            const a = (parseFloat(document.getElementById('in-A').value) || 0) * b.fatorPegada;
            const c = (parseFloat(document.getElementById('in-C').value) || 0) * b.fatorPegada;
            const q = (parseFloat(document.getElementById('in-Q').value) || 0) * b.m2Peca;

            const prod = a + c;
            const totalGeral = prod + q;
            
            const card = document.getElementById('res-' + slotId);
            card.classList.add('ativo');
            card.querySelector('.tag-info').innerText = "FECHADO";
            card.querySelector('.tag-info').style.background = "#27ae60";

            card.querySelector('.v-total').innerText = prod.toFixed(2) + " m²";
            card.querySelector('.v-a').innerText = prod > 0 ? ((a/prod)*100).toFixed(1) + "%" : "0%";
            card.querySelector('.v-c').innerText = prod > 0 ? ((c/prod)*100).toFixed(1) + "%" : "0%";
            card.querySelector('.v-q').innerText = totalGeral > 0 ? ((q/totalGeral)*100).toFixed(1) + "%" : "0%";
        }
    </script>
</body>
</html>
