<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Qualidade Unificado</title>
    <script src="config.js"></script>
    <style>
        body { background-color: #0f0f0f; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .main-column { width: 100%; max-width: 500px; display: none; flex-direction: column; gap: 20px; }
        #login-overlay { position: fixed; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 300px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { color: #3498db; margin-top: 0; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; }
        .input-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .input-group { flex: 1; }
        .perc-tag { background: #222; padding: 10px; border-radius: 6px; min-width: 60px; text-align: center; font-weight: bold; font-size: 0.9rem; border: 1px solid #333; }
        
        label { display: block; font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-size: 1rem; }
        
        .linha-detalhe { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-add { background: transparent; color: #3498db; border: 1px solid #3498db; padding: 8px; cursor: pointer; width: 100%; border-radius: 6px; margin-top: 10px; font-size: 0.8rem; }
        .btn-acao { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; font-size: 1rem; }
        .status-msg { font-size: 0.75rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Acesso Qualidade</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-acao" onclick="autenticar()">Entrar</button>
        </div>
    </div>

    <div class="main-column" id="app-content">
        <div class="card">
            <h2>Entrada de Dados</h2>
            
            <label>Bitola Técnica</label>
            <select id="bitola" onchange="calcular()"></select>

            <!-- CAMPO A -->
            <div class="input-row">
                <div class="input-group">
                    <label style="color:#27ae60">A (Pegadas)</label>
                    <input type="number" id="in-A" placeholder="0" oninput="calcular()">
                </div>
                <div class="perc-tag" id="tag-A" style="color:#27ae60">0%</div>
            </div>

            <!-- CAMPO C -->
            <div class="input-row">
                <div class="input-group">
                    <label style="color:#f1c40f">C (Pegadas)</label>
                    <input type="number" id="in-C" placeholder="0" oninput="calcular()">
                </div>
                <div class="perc-tag" id="tag-C" style="color:#f1c40f">0%</div>
            </div>
            
            <div style="background: #111; padding: 10px; border-radius: 8px; margin-top: 10px;">
                <label>Detalhamento Classe C</label>
                <div id="lista-C"></div>
                <button class="btn-add" onclick="addLinha('lista-C', DEFEITOS_LISTA)">+ Adicionar Defeito</button>
                <div id="msg-valid-C" class="status-msg"></div>
            </div>

            <!-- CAMPO Q -->
            <div class="input-row" style="margin-top:20px">
                <div class="input-group">
                    <label style="color:#e74c3c">Q (Quebra - Peças)</label>
                    <input type="number" id="in-Q" placeholder="0" oninput="calcular()">
                </div>
                <div class="perc-tag" id="tag-Q" style="color:#e74c3c">0%</div>
            </div>

            <div style="background: #111; padding: 10px; border-radius: 8px; margin-top: 10px;">
                <label>Detalhamento Quebra</label>
                <div id="lista-Q"></div>
                <button class="btn-add" onclick="addLinha('lista-Q', MOTIVOS_QUEBRA)">+ Adicionar Motivo</button>
            </div>

            <div style="text-align: center; margin-top: 25px; padding: 15px; background: #000; border-radius: 10px; border: 1px solid #3498db;">
                <span style="color:#888; font-size:0.7rem;">PRODUÇÃO TOTAL LÍQUIDA</span><br>
                <b id="res-total" style="font-size: 2.2rem; color:#3498db">0.00</b> <small>m²</small>
            </div>

            <button class="btn-acao" id="btn-registrar" onclick="salvarNoCaderno()">Registrar no Caderno</button>
        </div>
    </div>

    <script>
        let usuarios = JSON.parse(localStorage.getItem('usuarios_db')) || [{user:"admin", pass:"admin", nivel:"admin", turno:"Geral"}];
        let usuarioAtivo = null;

        function autenticar() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            usuarioAtivo = usuarios.find(x => x.user === u && x.pass === p);
            if(usuarioAtivo) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                carregarBitolas();
            } else { alert("Acesso negado!"); }
        }

        function carregarBitolas() {
            const sel = document.getElementById('bitola');
            sel.innerHTML = Object.keys(BANCO_BITOLAS).map(k => `<option value="${k}">${BANCO_BITOLAS[k].nome}</option>`).join('');
            calcular();
        }

        function addLinha(containerId, listaOpcoes) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'linha-detalhe';
            div.innerHTML = `
                <select style="flex:2">${listaOpcoes.map(o => `<option value="${o}">${o}</option>`).join('')}</select>
                <input type="number" class="detalhe-qtd" placeholder="Qtd" style="flex:1" oninput="calcular()">
                <button onclick="this.parentElement.remove(); calcular()" style="background:none; border:none; color:#e74c3c; cursor:pointer;">✕</button>
            `;
            container.appendChild(div);
            calcular();
        }

        function calcular() {
            const b = BANCO_BITOLAS[document.getElementById('bitola').value];
            const pegA = parseFloat(document.getElementById('in-A').value) || 0;
            const pegC = parseFloat(document.getElementById('in-C').value) || 0;
            const pecQ = parseFloat(document.getElementById('in-Q').value) || 0;

            // Metragens
            const mA = pegA * b.fatorPegada;
            const mC = pegC * b.fatorPegada;
            const mQ = pecQ * b.m2Peca; // Quebra usa m2 por peça

            const prodComercial = mA + mC;
            const totalGeral = mA + mC + mQ;

            // Porcentagens laterais
            document.getElementById('tag-A').innerText = (prodComercial > 0 ? (mA/prodComercial*100).toFixed(1) : 0) + "%";
            document.getElementById('tag-C').innerText = (prodComercial > 0 ? (mC/prodComercial*100).toFixed(1) : 0) + "%";
            document.getElementById('tag-Q').innerText = (totalGeral > 0 ? (mQ/totalGeral*100).toFixed(1) : 0) + "%";

            // Total m²
            document.getElementById('res-total').innerText = prodComercial.toFixed(2);

            // Validação de Detalhamento C
            validarDetalhamento('lista-C', pegC, 'msg-valid-C');
        }

        function validarDetalhamento(containerId, totalEsperado, msgId) {
            const inputs = document.querySelectorAll(`#${containerId} .detalhe-qtd`);
            let soma = 0;
            inputs.forEach(i => soma += parseFloat(i.value) || 0);

            const msgElement = document.getElementById(msgId);
            const btn = document.getElementById('btn-registrar');

            if (soma !== totalEsperado && totalEsperado > 0) {
                msgElement.innerText = `⚠️ Detalhado: ${soma} / Total: ${totalEsperado}`;
                msgElement.style.color = "#f1c40f";
                btn.disabled = true;
                btn.style.opacity = "0.5";
            } else {
                msgElement.innerText = totalEsperado > 0 ? "✅ Detalhamento OK" : "";
                msgElement.style.color = "#27ae60";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        function salvarNoCaderno() {
            // Aqui entra sua lógica de salvar no LocalStorage
            alert("Lançamento realizado com sucesso!");
            location.reload();
        }
    </script>
</body>
</html>
