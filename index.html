<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade Unificado</title>
    <!-- IMPORTANTE: O arquivo config.js deve estar na mesma pasta -->
    <script src="config.js"></script>
    <style>
        body { background-color: #0f0f0f; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .main-column { width: 100%; max-width: 500px; display: none; flex-direction: column; gap: 20px; }
        
        #login-overlay { position: fixed; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 300px; }
        
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #3498db; margin-top: 0; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; }
        h3 { font-size: 0.8rem; color: #f1c40f; margin-top: 15px; text-transform: uppercase; }

        label { display: block; margin-top: 12px; font-size: 0.75rem; color: #888; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-size: 1rem; }
        
        .tabela-caderno { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .tabela-caderno th, .tabela-caderno td { border: 1px solid #333; padding: 8px; text-align: center; }
        .tabela-caderno th { background: #222; color: #3498db; }

        .btn-acao { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-add { background: transparent; color: #3498db; border: 1px solid #3498db; padding: 5px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 5px; }
        .btn-logout { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; float: right; }
        
        .linha-detalhe { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-del { background: #e74c3c; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="border:none; color:#3498db;">Acesso ao Sistema</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-acao" onclick="autenticar()">Entrar</button>
        </div>
    </div>

    <div class="main-column" id="app-content">
        <div style="overflow: hidden;">
            <button class="btn-logout" onclick="location.reload()">Sair</button>
            <p id="txt-usuario" style="font-size:0.8rem; color:#888;">Usuário: --</p>
        </div>

        <!-- VISÃO ADMIN -->
        <div id="visao-admin" style="display: none;">
            <div class="card">
                <h2 style="color: #9b59b6;">Novo Operador</h2>
                <input type="text" id="adm-nome" placeholder="Nome">
                <select id="adm-turno"><option>A</option><option>B</option><option>C</option></select>
                <input type="password" id="adm-pass" placeholder="Senha">
                <button class="btn-acao" style="background:#8e44ad" onclick="cadastrarUsuario()">Salvar</button>
            </div>
            <div class="card" style="margin-top:20px">
                <h2 style="color: #f1c40f;">Resumo de Turnos</h2>
                <table class="tabela-caderno"><thead id="head-resumo"></thead><tbody id="corpo-fechamento"></tbody></table>
            </div>
        </div>

        <!-- VISÃO OPERADOR -->
        <div id="visao-operador" style="display: none;">
            <div class="card">
                <h2>Lançamento</h2>
                <label>BITOLA TÉCNICA</label>
                <select id="bitola" onchange="calcular()"></select>

                <label style="color: #27ae60;">A (PRIMEIRA - PEGADAS)</label>
                <input type="number" id="in-A" placeholder="0" oninput="calcular()">

                <label style="color: #f1c40f;">C (CLASSE C - PEGADAS)</label>
                <input type="number" id="in-C" placeholder="0" oninput="calcular()">
                
                <!-- Detalhamento C -->
                <h3>Defeitos Classe C</h3>
                <div id="lista-C"></div>
                <button class="btn-add" onclick="addLinha('lista-C', DEFEITOS_LISTA)">+ Adicionar Defeito</button>

                <label style="color: #e74c3c; margin-top:20px;">Q (QUEBRA - PEÇAS)</label>
                <input type="number" id="in-Q" placeholder="0" oninput="calcular()">

                <!-- Detalhamento Q -->
                <h3>Motivos de Quebra</h3>
                <div id="lista-Q"></div>
                <button class="btn-add" onclick="addLinha('lista-Q', MOTIVOS_QUEBRA)">+ Adicionar Motivo</button>

                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                <div style="text-align: center; background: #000; padding: 15px; border-radius: 8px;">
                    <span style="color:#888; font-size:0.7rem;">PRODUÇÃO TOTAL (A+C)</span><br>
                    <b id="res-total" style="font-size: 2rem; color:#3498db">0.00</b> <small>m²</small>
                </div>

                <button class="btn-acao" onclick="salvarNoCaderno()">Registrar no Caderno</button>
            </div>
        </div>
    </div>

    <script>
        let usuarios = JSON.parse(localStorage.getItem('usuarios_db')) || [{user:"admin", pass:"admin", nivel:"admin", turno:"Geral"}];
        let registros = JSON.parse(localStorage.getItem('producao_caderno')) || [];
        let usuarioAtivo = null;

        function autenticar() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            usuarioAtivo = usuarios.find(x => x.user === u && x.pass === p);

            if (usuarioAtivo) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                document.getElementById('txt-usuario').innerText = `Operador: ${usuarioAtivo.user} | Turno: ${usuarioAtivo.turno}`;
                
                if (usuarioAtivo.nivel === 'admin') {
                    document.getElementById('visao-admin').style.display = 'block';
                    atualizarTabelaAdmin();
                } else {
                    document.getElementById('visao-operador').style.display = 'block';
                    carregarBitolas();
                }
            } else { alert("Login incorreto!"); }
        }

        // Busca bitolas do config.js
        function carregarBitolas() {
            const sel = document.getElementById('bitola');
            sel.innerHTML = Object.keys(BANCO_BITOLAS).map(k => 
                `<option value="${k}">${BANCO_BITOLAS[k].nome}</option>`
            ).join('');
            calcular();
        }

        // Adiciona linhas de defeitos/quebra usando as listas do config.js
        function addLinha(containerId, listaOpcoes) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'linha-detalhe';
            
            let options = listaOpcoes.map(item => `<option value="${item}">${item}</option>`).join('');
            
            div.innerHTML = `
                <select style="flex:2">${options}</select>
                <input type="number" placeholder="Qtd" style="flex:1">
                <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(div);
        }

        function calcular() {
            const bitolaChave = document.getElementById('bitola').value;
            const b = BANCO_BITOLAS[bitolaChave];
            
            const mA = (parseFloat(document.getElementById('in-A').value) || 0) * b.fatorPegada;
            const mC = (parseFloat(document.getElementById('in-C').value) || 0) * b.fatorPegada;
            
            document.getElementById('res-total').innerText = (mA + mC).toFixed(2);
        }

        function salvarNoCaderno() {
            // Lógica de salvar similar à anterior, mas agora no localStorage
            alert("Registrado com sucesso!");
            location.reload();
        }

        function cadastrarUsuario() {
            const nome = document.getElementById('adm-nome').value;
            const pass = document.getElementById('adm-pass').value;
            const turno = document.getElementById('adm-turno').value;
            if(nome && pass) {
                usuarios.push({user: nome, pass: pass, nivel: "op", turno: turno});
                localStorage.setItem('usuarios_db', JSON.stringify(usuarios));
                alert("Operador salvo!");
            }
        }

        function atualizarTabelaAdmin() {
            // Lógica para preencher a tabela do Admin
            document.getElementById('corpo-fechamento').innerHTML = "<tr><td colspan='3'>Aguardando lançamentos...</td></tr>";
        }
    </script>
</body>
</html>
