<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade Industrial</title>
    <script src="config.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --primary: #3498db;
            --success: #27ae60; --warning: #f1c40f; --danger: #e74c3c;
            --text: #eee; --border: #282828;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 1100px; margin: auto; display: none; flex-direction: column; gap: 15px; }
        
        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 280px; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }

        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        h2 { font-size: 0.85rem; color: var(--primary); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 0; }
        
        label { display: block; font-size: 0.65rem; color: #888; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid var(--border); background: #1f1f1f; color: #fff; box-sizing: border-box; font-size: 0.9rem; }
        
        .detalhe-box { background: #111; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #333; }
        .linha-detalhe { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        
        .resumo-panel { position: sticky; top: 10px; background: #000; border: 2px solid var(--primary); padding: 15px; border-radius: 10px; height: fit-content; }
        .resumo-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .resumo-item b { color: var(--primary); }

        .admin-nav { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-tab { background: #1a1a1a; padding: 10px; font-size: 0.7rem; cursor: pointer; border: 1px solid var(--border); flex: 1; color: #888; }
        .btn-tab.active { background: var(--primary); color: white; }

        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        
        .btn-acao { background: var(--success); font-weight: bold; cursor: pointer; border: none; margin-top: 10px; color: white; }
        .btn-logout { background: #333; width: auto; float: right; font-size: 0.65rem; padding: 5px 10px; border: none; cursor: pointer; }
        .info-detalhe-real { font-size: 0.65rem; color: #666; margin-left: 5px; }
    </style>
</head>
<body onload="verificarSessao()">

    <div id="login-overlay">
        <div class="login-box">
            <h2>QUALIDADE INDUSTRIAL</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-acao" onclick="autenticar()">ENTRAR</button>
        </div>
    </div>

    <div class="container" id="app-content">
        <header style="overflow: hidden; margin-bottom: 10px;">
            <button class="btn-logout" onclick="logout()">SAIR</button>
            <span id="txt-user" style="font-size: 0.7rem; color: var(--primary); line-height: 25px;"></span>
        </header>

        <div id="view-op" style="display:none;">
            <div class="main-layout">
                <div class="form-lado">
                    <div class="card">
                        <h2>Dados da Produção</h2>
                        <label>Bitola Selecionada</label>
                        <select id="bitola" onchange="calcular()"></select>
                        
                        <label>A (1ª Qualidade - Pegadas)</label>
                        <input type="number" id="in-A" placeholder="0" oninput="calcular()">
                        
                        <label>C (Classe C - Pegadas)</label>
                        <input type="number" id="in-C" placeholder="0" oninput="calcular()">
                        <div class="detalhe-box">
                            <div id="lista-C"></div>
                            <button style="font-size:0.7rem; padding:5px" onclick="addLinha('lista-C', DEFEITOS_LISTA)">+ Add Peças Classe C</button>
                        </div>

                        <label>Quebra (Total Peças Soltas)</label>
                        <input type="number" id="in-Q" placeholder="0" oninput="calcular()">
                        <div class="detalhe-box">
                            <div id="lista-Q"></div>
                            <button style="font-size:0.7rem; padding:5px" onclick="addLinha('lista-Q', MOTIVOS_QUEBRA)">+ Add Peças Quebradas</button>
                        </div>
                    </div>
                </div>

                <div class="resumo-panel">
                    <h2>Resumo (m² e %)</h2>
                    <div id="painel-resultados">
                        <div class="resumo-item"><span>1ª Qualidade:</span><b id="res-A">0.00 m²</b></div>
                        <div class="resumo-item"><span>Classe C:</span><b id="res-C">0.00 m²</b></div>
                        <div class="resumo-item"><span>Quebra:</span><b id="res-Q">0.00 m²</b></div>
                        <div class="resumo-item" style="border-top: 2px solid #333; margin-top:10px;">
                            <span>TOTAL:</span><b id="res-total" style="font-size: 1.2rem;">0.00 m²</b>
                        </div>
                        <div class="resumo-item"><span>Índice C:</span><b id="perc-C">0%</b></div>
                        <div class="resumo-item"><span>Índice Quebra:</span><b id="perc-Q">0%</b></div>
                    </div>
                    <div id="msg-erro" style="color:var(--warning); font-size:0.7rem; margin-top:10px; font-weight:bold;"></div>
                    <button class="btn-acao" id="btn-registrar" onclick="salvar()">REGISTRAR QUALIDADE</button>
                </div>
            </div>
        </div>

        <div id="view-admin" style="display:none;">
            <div class="admin-nav">
                <button class="btn-tab active" onclick="switchTab('tab-caderno')">CADERNO</button>
                <button class="btn-tab" onclick="switchTab('tab-users')">USUÁRIOS</button>
            </div>
            <div id="tab-caderno" class="admin-content">
                <div class="card"><table id="tabela-caderno"><thead><tr><th>DATA</th><th>TURNO</th><th>BITOLA</th><th>A</th><th>C</th><th>Q</th><th>TOTAL</th></tr></thead><tbody id="corpo-caderno"></tbody></table></div>
            </div>
            <div id="tab-users" class="admin-content" style="display:none;">
                <div class="card">
                    <h2>Novo Usuário</h2>
                    <input type="text" id="new-user" placeholder="Login">
                    <input type="password" id="new-pass" placeholder="Senha">
                    <select id="new-turno"><option>A</option><option>B</option><option>C</option></select>
                    <button class="btn-acao" onclick="addUsuario()">SALVAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userAtivo = null;
        let BITOLAS_SISTEMA = {};

        function verificarSessao() {
            const sessao = sessionStorage.getItem('usuario_logado');
            if (sessao) {
                userAtivo = JSON.parse(sessao);
                iniciarApp();
            }
        }

        function autenticar() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            const db_users = JSON.parse(localStorage.getItem('usuarios_db')) || [{user:'admin', pass:'admin', nivel:'admin', turno:'Geral'}];
            
            userAtivo = db_users.find(x => x.user === u && x.pass === p);
            
            if(userAtivo) {
                sessionStorage.setItem('usuario_logado', JSON.stringify(userAtivo));
                iniciarApp();
            } else { alert("Acesso negado"); }
        }

        function iniciarApp() {
            initBitolas();
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('txt-user').innerText = `OPERADOR: ${userAtivo.user.toUpperCase()} | TURNO: ${userAtivo.turno}`;
            
            if(userAtivo.nivel === 'admin') {
                document.getElementById('view-admin').style.display = 'block';
                renderCaderno();
            } else {
                document.getElementById('view-op').style.display = 'block';
                carregarSelectBitolas();
            }
        }

        function logout() {
            sessionStorage.removeItem('usuario_logado');
            location.reload();
        }

        function initBitolas() {
            const salvas = localStorage.getItem('bitolas_config');
            BITOLAS_SISTEMA = salvas ? JSON.parse(salvas) : BANCO_BITOLAS;
        }

        function carregarSelectBitolas() {
            const sel = document.getElementById('bitola');
            sel.innerHTML = Object.keys(BITOLAS_SISTEMA).map(k => `<option value="${k}">${BITOLAS_SISTEMA[k].nome}</option>`).join('');
            calcular();
        }

        function addLinha(id, lista) {
            const container = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'linha-detalhe';
            div.innerHTML = `
                <select style="flex:1; padding:5px; font-size:0.7rem;">${lista.map(o => `<option>${o}</option>`).join('')}</select>
                <input type="number" class="detalhe-pcs" placeholder="Pçs" style="width:70px; padding:5px;" oninput="calcular()">
                <button onclick="this.parentElement.remove(); calcular()" style="width:30px; background:none; border:none; color:var(--danger);">✕</button>
            `;
            container.appendChild(div);
            calcular();
        }

        function calcular() {
            const b = BITOLAS_SISTEMA[document.getElementById('bitola').value];
            const pegA = parseFloat(document.getElementById('in-A').value) || 0;
            const pegC = parseFloat(document.getElementById('in-C').value) || 0;
            const pecQ = parseFloat(document.getElementById('in-Q').value) || 0;

            const mA = pegA * b.fatorPegada;
            const mC = pegC * b.fatorPegada;
            const mQ = pecQ * b.m2Peca;
            const mTotal = mA + mC;

            document.getElementById('res-A').innerText = `${mA.toFixed(2)} m²`;
            document.getElementById('res-C').innerText = `${mC.toFixed(2)} m²`;
            document.getElementById('res-Q').innerText = `${mQ.toFixed(2)} m²`;
            document.getElementById('res-total').innerText = `${mTotal.toFixed(2)} m²`;

            document.getElementById('perc-C').innerText = mTotal > 0 ? ((mC/mTotal)*100).toFixed(1) + "%" : "0%";
            document.getElementById('perc-Q').innerText = (mA+mC+mQ) > 0 ? ((mQ/(mA+mC+mQ))*100).toFixed(1) + "%" : "0%";

            validarTrava(pegC, b, pecQ);
        }

        function validarTrava(pegC, b, pecQ) {
            let somaC = 0, somaQ = 0;
            document.querySelectorAll('#lista-C .detalhe-pcs').forEach(i => somaC += parseFloat(i.value) || 0);
            document.querySelectorAll('#lista-Q .detalhe-pcs').forEach(i => somaQ += parseFloat(i.value) || 0);
            
            const pcsEsperadasC = Math.round(pegC * (b.pcsCaixa * b.cxPegada));
            const msg = document.getElementById('msg-erro');
            const btn = document.getElementById('btn-registrar');

            if(pcsEsperadasC > 0 && somaC !== pcsEsperadasC) {
                msg.innerText = `⚠️ Falta detalhar ${pcsEsperadasC - somaC} peças em C`;
                btn.disabled = true; btn.style.opacity = 0.5;
            } else if (pecQ > 0 && somaQ !== pecQ) {
                msg.innerText = `⚠️ Falta detalhar ${pecQ - somaQ} peças na Quebra`;
                btn.disabled = true; btn.style.opacity = 0.5;
            } else {
                msg.innerText = "";
                btn.disabled = false; btn.style.opacity = 1;
            }
        }

        function salvar() {
            const b = BITOLAS_SISTEMA[document.getElementById('bitola').value];
            const registro = {
                data: new Date().toLocaleDateString('pt-BR'),
                turno: userAtivo.turno,
                bitola: b.nome,
                ma: (parseFloat(document.getElementById('in-A').value) || 0) * b.fatorPegada,
                mc: (parseFloat(document.getElementById('in-C').value) || 0) * b.fatorPegada,
                mq: (parseFloat(document.getElementById('in-Q').value) || 0) * b.m2Peca,
                total: ( (parseFloat(document.getElementById('in-A').value) || 0) + (parseFloat(document.getElementById('in-C').value) || 0) ) * b.fatorPegada
            };

            let logs = JSON.parse(localStorage.getItem('producao_caderno')) || [];
            logs.push(registro);
            localStorage.setItem('producao_caderno', JSON.stringify(logs));
            
            alert("Registrado!");
            document.getElementById('in-A').value = ""; document.getElementById('in-C').value = ""; document.getElementById('in-Q').value = "";
            document.getElementById('lista-C').innerHTML = ""; document.getElementById('lista-Q').innerHTML = "";
            calcular();
        }

        function addUsuario() {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            const t = document.getElementById('new-turno').value;
            if(!u || !p) return alert("Preencha tudo");
            let db = JSON.parse(localStorage.getItem('usuarios_db')) || [{user:'admin', pass:'admin', nivel:'admin', turno:'Geral'}];
            db.push({user:u, pass:p, nivel:'op', turno:t});
            localStorage.setItem('usuarios_db', JSON.stringify(db));
            alert("Usuário Criado!");
            document.getElementById('new-user').value = ""; document.getElementById('new-pass').value = "";
        }

        function switchTab(t) {
            document.querySelectorAll('.admin-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(t).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function renderCaderno() {
            const d = JSON.parse(localStorage.getItem('producao_caderno')) || [];
            document.getElementById('corpo-caderno').innerHTML = d.reverse().map(x => `
                <tr><td>${x.data}</td><td>${x.turno}</td><td>${x.bitola}</td><td>${x.ma.toFixed(2)}</td><td>${x.mc.toFixed(2)}</td><td>${x.mq.toFixed(2)}</td><td><b>${x.total.toFixed(2)}</b></td></tr>
            `).join('');
        }
    </script>
</body>
</html>
