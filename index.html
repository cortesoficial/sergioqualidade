<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Qualidade - Direto</title>
    <style>
        body { background-color: #0d0d0d; font-family: 'Segoe UI', sans-serif; color: #fff; margin: 0; display: flex; height: 100vh; }
        
        /* Lado Esquerdo: Lançamento */
        .col-esquerda { width: 380px; background: #161616; padding: 25px; border-right: 1px solid #333; overflow-y: auto; }
        h2 { color: #3498db; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 20px; border-left: 4px solid #3498db; padding-left: 10px; }

        label { display: block; margin-top: 15px; font-size: 0.75rem; color: #888; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 4px; border: 1px solid #333; background: #0f0f0f; color: #fff; box-sizing: border-box; }
        
        .btn-registrar { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 4px; background: #27ae60; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Lado Direito: Histórico do Turno */
        .col-direita { flex-grow: 1; padding: 30px; background: #0a0a0a; overflow-y: auto; }
        .topo-turno { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .status-turno { background: #3498db; padding: 5px 15px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }

        .grid-fechados { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* Card de Qualidade */
        .card-final { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 8px; border-top: 4px solid #27ae60; }
        .card-final h3 { margin: 0 0 10px 0; font-size: 1rem; color: #3498db; }
        .dado-linha { display: flex; justify-content: space-between; margin-bottom: 5px; padding: 5px 0; border-bottom: 1px solid #252525; }
        .dado-linha span { color: #777; font-size: 0.85rem; }
        .detalhe-box { margin-top: 10px; padding: 10px; background: #0f0f0f; border-radius: 4px; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body onload="verificarTurno()">

    <div class="col-esquerda">
        <h2>Registrar Qualidade</h2>
        
        <label>ORDEM / TURNO</label>
        <select id="ordem">
            <option value="1ª Qualidade">1ª Qualidade</option>
            <option value="2ª Qualidade">2ª Qualidade</option>
            <option value="3ª Qualidade">3ª Qualidade</option>
            <option value="4ª Qualidade">4ª Qualidade</option>
        </select>

        <label>BITOLA</label>
        <input type="text" id="bitola" placeholder="Ex: 2280">

        <label style="color: #27ae60;">A (PRIMEIRA)</label>
        <input type="number" id="val-a" placeholder="0">

        <label style="color: #f1c40f;">C (CLASSE C)</label>
        <input type="number" id="val-c" placeholder="0">

        <label style="color: #e74c3c;">Q (QUEBRA)</label>
        <input type="number" id="val-q" placeholder="0">

        <label>DETALHAMENTO C (DEFEITOS)</label>
        <textarea id="det-c" rows="2" placeholder="Ex: CAL=0,4; DIM=0,3"></textarea>

        <label>DETALHAMENTO Q (MOTIVOS)</label>
        <textarea id="det-q" rows="2" placeholder="Ex: PQ; PA"></textarea>

        <button class="btn-registrar" onclick="salvarQualidade()">REGISTRAR QUALIDADE</button>
    </div>

    <div class="col-direita">
        <div class="topo-turno">
            <h1 style="font-size: 1.2rem; margin: 0;">Qualidades Fechadas</h1>
            <div id="display-turno" class="status-turno">---</div>
        </div>

        <div id="lista-cards" class="grid-fechados">
            <!-- Os registros de A, C e Q aparecerão aqui -->
        </div>
    </div>

    <script>
        function verificarTurno() {
            const h = new Date().getHours();
            let turno = "";
            if (h >= 5 && h < 13) turno = "TURNO A (05h - 13h)";
            else if (h >= 13 && h < 21) turno = "TURNO B (13h - 21h)";
            else turno = "TURNO C (21h - 05h)";
            document.getElementById('display-turno').innerText = turno;
        }

        function salvarQualidade() {
            const lista = document.getElementById('lista-cards');
            const card = document.createElement('div');
            card.className = 'card-final';
            
            const agora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Pega os valores exatamente como digitados
            const b = document.getElementById('bitola').value;
            const a = document.getElementById('val-a').value || "0";
            const c = document.getElementById('val-c').value || "0";
            const q = document.getElementById('val-q').value || "0";
            const detC = document.getElementById('det-c').value;
            const detQ = document.getElementById('det-q').value;
            const ord = document.getElementById('ordem').value;

            card.innerHTML = `
                <h3>${ord} - ${agora}</h3>
                <div class="dado-linha"><span>Bitola:</span> <b>${b}</b></div>
                <div class="dado-linha"><span>A (Primeira):</span> <b style="color:#27ae60">${a}</b></div>
                <div class="dado-linha"><span>C (Classe C):</span> <b style="color:#f1c40f">${c}</b></div>
                <div class="dado-linha"><span>Q (Quebra):</span> <b style="color:#e74c3c">${q}</b></div>
                
                <div class="detalhe-box">
                    <strong>Defeitos (C):</strong><br>${detC || 'Nenhum'}
                </div>
                <div class="detalhe-box" style="border-top: 1px solid #222;">
                    <strong>Motivos (Q):</strong><br>${detQ || 'Nenhum'}
                </div>
            `;

            lista.prepend(card);
            
            // Limpa os campos para o próximo registro
            document.getElementById('val-a').value = "";
            document.getElementById('val-c').value = "";
            document.getElementById('val-q').value = "";
            document.getElementById('det-c').value = "";
            document.getElementById('det-q').value = "";
        }
    </script>
</body>
</html>
