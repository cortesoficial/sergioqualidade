<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade - Industrial</title>
    <!-- O arquivo config.js deve estar na mesma pasta ou no GitHub -->
    <script src="config.js"></script>
    <style>
        body { background-color: #0f0f0f; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; text-align: center; }
        .wide-container { max-width: 1000px; }
        h2 { color: #3498db; margin-bottom: 20px; }
        h3 { color: #ccc; margin-bottom: 15px; font-size: 1rem; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #3498db; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        
        .btn-add { background: #27ae60; }
        .btn-def { background: #8e44ad; margin-bottom: 10px; font-size: 0.8rem; padding: 8px; width: auto; }
        .btn-sair { background: #e74c3c; width: auto; padding: 8px 20px; margin-bottom: 20px; float: right; }
        
        .radio-group { display: flex; justify-content: space-around; background: #252525; padding: 10px; border-radius: 6px; margin: 10px 0; border: 1px solid #333; }
        .radio-group label { font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #222; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; font-size: 0.85rem; }
        th { background-color: #3498db; }
        
        .grid-painel { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; text-align: left; }
        .card { background: #252525; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        
        .linha-defeito { display: grid; grid-template-columns: 2.5fr 1fr 40px; gap: 10px; align-items: center; margin-bottom: 5px; }
        .btn-remove { background: #c0392b; padding: 5px; margin: 0; }

        .info-linha { font-size: 0.85rem; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #444; }
        .info-linha b { color: #3498db; }
        .alerta-limite { color: #e74c3c; font-weight: bold; font-size: 0.75rem; display: none; margin-top: 5px; }

        .stats-final { margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #1a1a1a; padding: 10px; border-radius: 4px; border-bottom: 3px solid #3498db; }
        .stat-box small { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; }

        @media (max-width: 800px) { .grid-painel { grid-template-columns: 1fr; } }
    </style>
</head>
<body onload="verificarSessao()">

    <!-- LOGIN (Omitido para focar no cálculo, mas funcional) -->
    <div id="login-section" class="container">
        <h2>Qualidade - Acesso</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
    </div>

    <!-- PAINEL OPERACIONAL -->
    <div id="user-panel" class="container wide-container" style="display: none;">
        <button onclick="logout()" class="btn-sair">Sair</button>
        <h2 style="text-align: left;">Apontamento de Qualidade</h2>
        
        <div class="grid-painel">
            <div class="card">
                <p>Operador: <strong id="nome-logado" style="color: #3498db;"></strong></p>
                
                <label>Bitola:</label>
                <select id="select-bitola" onchange="calcular()"></select>

                <label>Modo de Cálculo:</label>
                <div class="radio-group">
                    <label><input type="radio" name="modo" value="acq" checked onclick="calcular()"> A+C+Q</label>
                    <label><input type="radio" name="modo" value="aq" onclick="calcular()"> A+Q</label>
                </div>

                <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">

                <label>A (Pegadas):</label>
                <input type="number" id="input-A" placeholder="0" oninput="calcular()">

                <label>Q (Quebra em Peças):</label>
                <input type="number" id="input-Q" placeholder="0" oninput="calcular()">
                <span id="msg-limit-Q" class="alerta-limite">LIMITE DE QUEBRA EXCEDIDO!</span>

                <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
                
                <div id="bloco-classe-c">
                    <h3>Defeitos Classe C (Peças)</h3>
                    <div id="lista-defeitos"></div>
                    <button onclick="adicionarLinhaDefeito()" class="btn-def">+ Adicionar Defeito</button>
                    <span id="msg-limit-C" class="alerta-limite">LIMITE CLASSE C EXCEDIDO!</span>
                </div>
            </div>

            <div class="card" style="border-color: #3498db;">
                <h3 style="color: #3498db;">Resultados</h3>
                
                <div class="info-linha" style="border-left-color: #27ae60;">
                    <span>Classe A: <b id="perc-A-ind">0.00</b>%</span>
                    <small><span id="res-A">0.00</span> m²</small>
                </div>

                <div id="res-linha-c" class="info-linha" style="border-left-color: #f1c40f;">
                    <span>Classe C: <b id="perc-C-ind">0.00</b>%</span>
                    <small><span id="res-C">0.00</span> m² | Peças: <b id="total-pcs-c">0</b></small>
                </div>

                <div class="info-linha" style="border-left-color: #e74c3c;">
                    <span>Quebra Q: <b id="perc-Q-ind">0.00</b>%</span>
                    <small><span id="res-Q">0.00</span> m²</small>
                </div>

                <div class="stats-final">
                    <div class="stat-box"><small id="label-prod">Prod. (A+C)</small><strong id="total-ac">0.00</strong> m²</div>
                    <div class="stat-box"><small>Total Geral</small><strong id="total-acq">0.00</strong> m²</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function popularBitolas() {
            const select = document.getElementById('select-bitola');
            select.innerHTML = Object.keys(BANCO_BITOLAS).map(key => 
                `<option value="${key}">${BANCO_BITOLAS[key].nome}</option>`
            ).join('');
        }

        function verificarSessao() {
            popularBitolas();
            // Lógica de sessão mantida...
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('user-panel').style.display = 'block';
            document.getElementById('nome-logado').innerText = "OPERADOR";
        }

        function adicionarLinhaDefeito() {
            const container = document.getElementById('lista-defeitos');
            const div = document.createElement('div');
            div.className = 'linha-defeito';
            let options = DEFEITOS_LISTA.map(d => `<option value="${d}">${d}</option>`).join('');
            div.innerHTML = `<select>${options}</select><input type="number" class="qtd-def" value="0" oninput="calcular()"><button onclick="this.parentElement.remove();calcular();" class="btn-remove">X</button>`;
            container.appendChild(div);
            calcular();
        }

        function calcular() {
            const bitolaKey = document.getElementById('select-bitola').value;
            const config = BANCO_BITOLAS[bitolaKey];
            const modo = document.querySelector('input[name="modo"]:checked').value;

            const valA = parseFloat(document.getElementById('input-A').value) || 0;
            const valQ = parseFloat(document.getElementById('input-Q').value) || 0;
            let totalPcsC = 0;
            document.querySelectorAll('.qtd-def').forEach(input => totalPcsC += parseFloat(input.value) || 0);

            let m2A = valA * config.fatorPegada;
            let m2Q = valQ * config.m2Peca;
            let m2C = totalPcsC * config.m2Peca;

            let totalBase, totalGeral, pA, pC, pQ;

            if (modo === "acq") {
                // Modo A+C+Q
                document.getElementById('bloco-classe-c').style.opacity = "1";
                document.getElementById('res-linha-c').style.display = "block";
                document.getElementById('label-prod').innerText = "Prod. (A+C)";
                
                totalBase = m2A + m2C; // Base para A e C
                totalGeral = m2A + m2C + m2Q; // Base para Q
                
                pA = totalBase > 0 ? (m2A / totalBase) * 100 : 0;
                pC = totalBase > 0 ? (m2C / totalBase) * 100 : 0;
                pQ = totalGeral > 0 ? (m2Q / totalGeral) * 100 : 0;
            } else {
                // Modo A+Q
                document.getElementById('bloco-classe-c').style.opacity = "0.3";
                document.getElementById('res-linha-c').style.display = "none";
                document.getElementById('label-prod').innerText = "Prod. (A)";
                
                totalBase = m2A;
                totalGeral = m2A + m2Q;
                
                pA = totalBase > 0 ? 100 : 0;
                pC = 0;
                pQ = totalGeral > 0 ? (m2Q / totalGeral) * 100 : 0;
            }

            document.getElementById('res-A').innerText = m2A.toFixed(2);
            document.getElementById('res-C').innerText = m2C.toFixed(2);
            document.getElementById('res-Q').innerText = m2Q.toFixed(2);
            document.getElementById('perc-A-ind').innerText = pA.toFixed(2);
            document.getElementById('perc-C-ind').innerText = pC.toFixed(2);
            document.getElementById('perc-Q-ind').innerText = pQ.toFixed(2);
            document.getElementById('total-ac').innerText = totalBase.toFixed(2);
            document.getElementById('total-acq').innerText = totalGeral.toFixed(2);
            document.getElementById('total-pcs-c').innerText = totalPcsC;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
