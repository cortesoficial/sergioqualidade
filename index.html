<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade - Controle de Detalhamento</title>
    <script src="config.js"></script>
    <style>
        body { background-color: #0f0f0f; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; text-align: center; }
        .wide-container { max-width: 1000px; }
        h2 { color: #3498db; margin-bottom: 20px; }
        h3 { color: #ccc; margin-bottom: 15px; font-size: 1rem; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #3498db; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        
        .btn-def { background: #8e44ad; margin-bottom: 10px; font-size: 0.8rem; padding: 8px; width: auto; }
        .btn-sair { background: #e74c3c; width: auto; padding: 8px 20px; margin-bottom: 20px; float: right; }
        
        .radio-group { display: flex; justify-content: space-around; background: #252525; padding: 10px; border-radius: 6px; margin: 10px 0; border: 1px solid #333; }
        .radio-group label { font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .grid-painel { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; text-align: left; }
        .card { background: #252525; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        
        .linha-defeito { display: grid; grid-template-columns: 2fr 0.8fr 1fr 40px; gap: 10px; align-items: center; margin-bottom: 8px; background: #1a1a1a; padding: 5px; border-radius: 4px; border: 1px solid #333; }
        .perc-defeito-label { font-size: 0.75rem; color: #f1c40f; text-align: center; font-weight: bold; }
        
        .info-linha { font-size: 0.85rem; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #444; }
        .info-linha b { color: #3498db; }
        
        .alerta-erro { color: #ff4757; font-weight: bold; font-size: 0.8rem; display: none; margin-top: 10px; padding: 10px; background: rgba(255, 71, 87, 0.1); border-radius: 5px; border: 1px solid #ff4757; }

        .barra-progresso-container { background: #333; height: 10px; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .barra-progresso { height: 100%; background: #f1c40f; width: 0%; transition: 0.3s; }

        @media (max-width: 800px) { .grid-painel { grid-template-columns: 1fr; } }
    </style>
</head>
<body onload="verificarSessao()">

    <div id="user-panel" class="container wide-container">
        <button onclick="location.reload()" class="btn-sair">Sair</button>
        <h2 style="text-align: left;">Controle de Qualidade</h2>
        
        <div class="grid-painel">
            <div class="card">
                <label>Bitola:</label>
                <select id="select-bitola" onchange="calcular()"></select>

                <div class="radio-group">
                    <label><input type="radio" name="modo" value="acq" checked onclick="calcular()"> A+C+Q</label>
                    <label><input type="radio" name="modo" value="aq" onclick="calcular()"> A+Q</label>
                </div>

                <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">

                <label style="color: #27ae60;">A (Primeira em PEGADAS):</label>
                <input type="number" id="input-A" placeholder="0" oninput="calcular()">

                <div id="container-entrada-c">
                    <label style="color: #f1c40f;">C (Classe C em PEGADAS):</label>
                    <input type="number" id="input-C" placeholder="0" oninput="calcular()">
                    
                    <div class="barra-progresso-container">
                        <div id="progresso-detalhe" class="barra-progresso"></div>
                    </div>
                    <small id="legenda-detalhe" style="font-size: 0.7rem; color: #888;">Detalhamento: 0/0 m²</small>
                </div>

                <label style="color: #e74c3c;">Q (Quebra em PEÇAS):</label>
                <input type="number" id="input-Q" placeholder="0" oninput="calcular()">

                <div id="msg-erro-detalhe" class="alerta-erro">
                    ⚠️ ATENÇÃO: O detalhamento em peças ultrapassou o volume de Pegadas de C! Verifique as quantidades.
                </div>

                <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
                
                <div id="secao-defeitos">
                    <h3>Detalhamento por Defeitos (Peças)</h3>
                    <div id="lista-defeitos"></div>
                    <button onclick="adicionarLinhaDefeito()" class="btn-def">+ Adicionar Defeito</button>
                </div>
            </div>

            <div class="card" style="border-color: #3498db;">
                <h3 style="color: #3498db;">Resultado Final</h3>
                
                <div class="info-linha" style="border-left-color: #27ae60;">
                    <span>Classe A: <b id="perc-A-ind">0.00</b>%</span>
                    <small><span id="res-A">0.00</span> m²</small>
                </div>

                <div id="box-res-c" class="info-linha" style="border-left-color: #f1c40f;">
                    <span>Classe C: <b id="perc-C-ind">0.00</b>%</span>
                    <small><span id="res-C">0.00</span> m²</small>
                </div>

                <div class="info-linha" style="border-left-color: #e74c3c;">
                    <span>Quebra Q: <b id="perc-Q-ind">0.00</b>%</span>
                    <small><span id="res-Q">0.00</span> m²</small>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 6px;">
                    <small style="color: #888;">TOTAL PRODUÇÃO (A+C)</small><br>
                    <strong id="total-producao" style="font-size: 1.5rem;">0.00</strong> <span style="font-size: 0.8rem;">m²</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function popularBitolas() {
            const select = document.getElementById('select-bitola');
            select.innerHTML = Object.keys(BANCO_BITOLAS).map(key => 
                `<option value="${key}">${BANCO_BITOLAS[key].nome}</option>`
            ).join('');
        }

        function verificarSessao() { popularBitolas(); calcular(); }

        function adicionarLinhaDefeito() {
            const container = document.getElementById('lista-defeitos');
            const div = document.createElement('div');
            div.className = 'linha-defeito';
            let options = DEFEITOS_LISTA.map(d => `<option value="${d}">${d}</option>`).join('');
            div.innerHTML = `
                <select>${options}</select>
                <input type="number" class="qtd-def" placeholder="Pçs" oninput="calcular()">
                <div class="perc-defeito-label">0%</div>
                <button onclick="this.parentElement.remove();calcular();" style="background:#c0392b; width:40px; padding:5px;">X</button>
            `;
            container.appendChild(div);
        }

        function calcular() {
            const bitolaKey = document.getElementById('select-bitola').value;
            const config = BANCO_BITOLAS[bitolaKey];
            const modo = document.querySelector('input[name="modo"]:checked').value;

            const pegA = parseFloat(document.getElementById('input-A').value) || 0;
            const pegC = parseFloat(document.getElementById('input-C').value) || 0;
            const pcsQ = parseFloat(document.getElementById('input-Q').value) || 0;

            const m2A = pegA * config.fatorPegada;
            const m2C = pegC * config.fatorPegada;
            const m2Q = pcsQ * config.m2Peca;

            // Cálculos de Produção
            let prodBase = (modo === "acq") ? (m2A + m2C) : m2A;
            let totalGeral = prodBase + m2Q;

            // Cálculo do Detalhamento em Peças
            let m2TotalDetalhamento = 0;
            document.querySelectorAll('.linha-defeito').forEach(linha => {
                const pcs = parseFloat(linha.querySelector('.qtd-def').value) || 0;
                const m2Def = pcs * config.m2Peca;
                m2TotalDetalhamento += m2Def;
                
                // % individual do defeito sobre o volume de C disponível
                const percInd = m2C > 0 ? (m2Def / m2C) * 100 : 0;
                linha.querySelector('.perc-defeito-label').innerText = percInd.toFixed(0) + "%";
            });

            // Lógica de Travamento / Alerta
            const progressoPerc = m2C > 0 ? (m2TotalDetalhamento / m2C) * 100 : 0;
            const barra = document.getElementById('progresso-detalhe');
            const msgErro = document.getElementById('msg-erro-detalhe');
            
            barra.style.width = Math.min(progressoPerc, 100) + "%";
            document.getElementById('legenda-detalhe').innerText = `Detalhamento: ${m2TotalDetalhamento.toFixed(2)} / ${m2C.toFixed(2)} m²`;

            if (m2TotalDetalhamento > (m2C + 0.01)) { // Tolerância de arredondamento
                barra.style.background = "#ff4757";
                msgErro.style.display = "block";
            } else {
                barra.style.background = "#f1c40f";
                msgErro.style.display = "none";
            }

            // Exibição de Resultados
            document.getElementById('res-A').innerText = m2A.toFixed(2);
            document.getElementById('res-C').innerText = m2C.toFixed(2);
            document.getElementById('res-Q').innerText = m2Q.toFixed(2);
            document.getElementById('perc-A-ind').innerText = (prodBase > 0 ? (m2A/prodBase)*100 : 0).toFixed(2);
            document.getElementById('perc-C-ind').innerText = (prodBase > 0 ? (m2C/prodBase)*100 : 0).toFixed(2);
            document.getElementById('perc-Q-ind').innerText = (totalGeral > 0 ? (m2Q/totalGeral)*100 : 0).toFixed(2);
            document.getElementById('total-producao').innerText = prodBase.toFixed(2);

            // Esconder/Mostrar C conforme o modo
            document.getElementById('container-entrada-c').style.display = (modo === "acq") ? "block" : "none";
            document.getElementById('secao-defeitos').style.display = (modo === "acq") ? "block" : "none";
            document.getElementById('box-res-c').style.display = (modo === "acq") ? "block" : "none";
        }
    </script>
</body>
</html>
